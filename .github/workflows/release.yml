name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Verify release input checksum
        shell: pwsh
        run: |
          $expected = (Get-Content release_inputs/damage_histogram_release_payload.zip.sha256).Split(" ")[0].Trim().ToLowerInvariant()
          $actual = (Get-FileHash release_inputs/damage_histogram_release_payload.zip -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actual -ne $expected) {
            throw "release input checksum mismatch: expected $expected actual $actual"
          }

      - name: Expand release input
        shell: pwsh
        run: |
          Expand-Archive -LiteralPath release_inputs/damage_histogram_release_payload.zip -DestinationPath release -Force
          $required = @(
            "release/DamageHistogramMod/DamageHistogramMod.dll",
            "release/DamageHistogramMod/config.json",
            "release/DamageHistogramMod/histogram_icons/attack.png",
            "release/DamageHistogramMod/histogram_icons/retaliation.png"
          )
          foreach ($path in $required) {
            if (!(Test-Path -LiteralPath $path)) {
              throw "Release input is missing required file: $path"
            }
          }

      - name: Download BepInEx IL2CPP
        shell: pwsh
        run: |
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/BepInEx/BepInEx/releases/latest"
          $asset = $release.assets |
            Where-Object { $_.name -match "Unity\.IL2CPP-win-x64.*\.zip$" -or $_.name -match "UnityIL2CPP_x64.*\.zip$" } |
            Select-Object -First 1

          if ($null -eq $asset) {
            Write-Error "Could not find a Windows x64 Unity IL2CPP BepInEx zip in the latest BepInEx release."
          }

          New-Item -ItemType Directory -Force -Path "release\bepinex" | Out-Null
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "release\bepinex\BepInEx.zip"
          Write-Host "Downloaded $($asset.name)"

      - name: Build mod zip
        shell: pwsh
        run: |
          Compress-Archive -Path "release\DamageHistogramMod\*" -DestinationPath "release\DamageHistogramMod.zip" -Force

      - name: Build Windows installer exe
        shell: pwsh
        run: |
          dotnet publish .\installer\DamageHistogramInstaller.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            "-p:PayloadDir=$PWD\release\DamageHistogramMod" `
            "-p:BepInExZip=$PWD\release\bepinex\BepInEx.zip" `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o release `
            --nologo

          if (!(Test-Path -LiteralPath "release\DamageHistogramModInstaller.exe")) {
            Write-Error "Installer exe was not produced."
          }

      - name: Build checksums
        shell: pwsh
        run: |
          foreach ($path in @("release\DamageHistogramMod.zip", "release\DamageHistogramModInstaller.exe")) {
            $hash = (Get-FileHash $path -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $([System.IO.Path]::GetFileName($path))" | Set-Content -Path "$path.sha256" -Encoding ASCII
          }

      - name: Attest package
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            release/DamageHistogramMod.zip
            release/DamageHistogramMod.zip.sha256
            release/DamageHistogramModInstaller.exe
            release/DamageHistogramModInstaller.exe.sha256

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DamageHistogramMod-release
          path: |
            release/DamageHistogramMod.zip
            release/DamageHistogramMod.zip.sha256
            release/DamageHistogramModInstaller.exe
            release/DamageHistogramModInstaller.exe.sha256

      - name: Upload assets to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/DamageHistogramMod.zip
            release/DamageHistogramMod.zip.sha256
            release/DamageHistogramModInstaller.exe
            release/DamageHistogramModInstaller.exe.sha256
          generate_release_notes: true
